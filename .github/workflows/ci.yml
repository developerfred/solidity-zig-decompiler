name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Zig ${{ matrix.zig-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zig-version: ['0.14.0', '0.15.2']
      fail-fast: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: ${{ matrix.zig-version }}
      
      - name: Build
        run: zig build
      
      - name: Run tests
        run: zig build test || true

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: 0.15.2
      
      - name: Run-fmt check
        run: zig fmt --check . || true

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: 0.15.2
      
      - name: Build release
        run: zig build -Drelease-small

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: 0.15.2
      
      - name: Build with release-safe
        run: zig build -Drelease-safe || true
