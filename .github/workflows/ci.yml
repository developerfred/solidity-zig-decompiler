name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Zig ${{ matrix.zig-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zig-version: ['0.14.0', '0.15.0', '0.15.2']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: ${{ matrix.zig-version }}
      
      - name: Build
        run: zig build
      
      - name: Run tests
        run: zig build test

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: 0.15.2
      
      - name: Run-fmt check
        run: zig fmt --check .
      
      - name: Run-stage1 compile
        run: zig build -Dstage1

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: 0.15.2
      
      - name: Build with release-safe
        run: zig build -Drelease-safe
      
      - name: Run scanner tests
        run: zig build test -- summary

  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-windows
          - aarch64-macos
          - x86_64-macos
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: ziglang/setup-zig@v1
        with:
          version: 0.15.2
      
      - name: Cross compile
        run: zig build -Dtarget=${{ matrix.target }}
