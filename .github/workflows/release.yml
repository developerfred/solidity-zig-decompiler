name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: dtolnay/zig-action@0.15.2

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Release
        run: |
          zig build -Drelease-safe --prefix release

      - name: Create tarball
        run: |
          tar -czvf decompile-contracts-${{ steps.version.outputs.VERSION }}-x86_64.tar.gz \
            -C release .

      - name: Create macOS tarball
        run: |
          tar -czvf decompile-contracts-${{ steps.version.outputs.VERSION }}-aarch64.tar.gz \
            -C release .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            decompile-contracts-${{ steps.version.outputs.VERSION }}-x86_64.tar.gz
            decompile-contracts-${{ steps.version.outputs.VERSION }}-aarch64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
